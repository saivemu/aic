name: aic
services:
  eval:
    image: ghcr.io/intrinsic-dev/aic/aic_eval
    # image: my-eval:v1
    build:
      dockerfile: docker/aic_eval/Dockerfile
      context: ..
    command: gazebo_gui:=false launch_rviz:=false ground_truth:=false start_aic_engine:=true shutdown_on_aic_engine_exit:=true model_discovery_timeout_seconds:=600
    gpus: all
    networks:
      - default
    environment:
      AIC_EVAL_PASSWD: CHANGE_IN_PROD
      AIC_MODEL_PASSWD: CHANGE_IN_PROD
      # AIC_ENABLE_ACL: true
  model:
    image: aic-runact:plans-bc
    build:
      dockerfile: docker/aic_model/Dockerfile
      context: ..
    gpus: all
    networks:
      - default
    environment:
      RMW_IMPLEMENTATION: rmw_zenoh_cpp
      ZENOH_ROUTER_CHECK_ATTEMPTS: -1
      AIC_ROUTER_ADDR: eval:7447
      AIC_MODEL_PASSWD: CHANGE_IN_PROD
      # Switch policy at runtime without rebuilding:
      #   default        ->  Plan B (ACT 300ep, compose 112.90)  [shipping]
      #   AIC_POLICY_PLAN=c docker compose ... up  ->  Plan C (Diffusion 300ep, compose 86.03)
      AIC_POLICY_PLAN: ${AIC_POLICY_PLAN:-b}
      # AIC_ENABLE_ACL: true
networks:
  default:
    internal: true
