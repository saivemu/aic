name: aic
services:
  eval:
    image: ghcr.io/intrinsic-dev/aic/aic_eval
    # image: my-eval:v1
    build:
      dockerfile: docker/aic_eval/Dockerfile
      context: ..
    command: gazebo_gui:=false launch_rviz:=false ground_truth:=false start_aic_engine:=true shutdown_on_aic_engine_exit:=true model_discovery_timeout_seconds:=600
    gpus: all
    networks:
      - default
    environment:
      AIC_EVAL_PASSWD: CHANGE_IN_PROD
      AIC_MODEL_PASSWD: CHANGE_IN_PROD
      # AIC_ENABLE_ACL: true
  model:
    image: aic-runact:plans-bc
    build:
      dockerfile: docker/aic_model/Dockerfile
      context: ..
    gpus: all
    networks:
      - default
    environment:
      RMW_IMPLEMENTATION: rmw_zenoh_cpp
      ZENOH_ROUTER_CHECK_ATTEMPTS: -1
      AIC_ROUTER_ADDR: eval:7447
      AIC_MODEL_PASSWD: CHANGE_IN_PROD
      # Switch policy at runtime without rebuilding:
      #   default                  -> Plan D (ACT 299ep, 43-D state, image_scale 0.5)
      #   AIC_POLICY_PLAN=b ...up  -> Plan B (ACT 300ep, 26-D state, image_scale 0.25; compose 112.90)
      AIC_POLICY_PLAN: ${AIC_POLICY_PLAN:-d}
      # Experimental guarded final-stage search. Empty/false keeps Plan D behavior unchanged.
      AIC_ENABLE_FINAL_SEARCH: ${AIC_ENABLE_FINAL_SEARCH:-}
      AIC_FINAL_SEARCH_START_S: ${AIC_FINAL_SEARCH_START_S:-8.0}
      AIC_FINAL_SEARCH_RADIUS_M: ${AIC_FINAL_SEARCH_RADIUS_M:-0.035}
      AIC_FINAL_SEARCH_GROWTH_MPS: ${AIC_FINAL_SEARCH_GROWTH_MPS:-0.0035}
      AIC_FINAL_SEARCH_PERIOD_S: ${AIC_FINAL_SEARCH_PERIOD_S:-4.0}
      AIC_FINAL_SEARCH_MAX_XY_SPEED_MPS: ${AIC_FINAL_SEARCH_MAX_XY_SPEED_MPS:-0.010}
      AIC_FINAL_SEARCH_DOWN_VZ_MPS: ${AIC_FINAL_SEARCH_DOWN_VZ_MPS:--0.006}
      # Optional second ACT checkpoint used only for the final insertion phase.
      AIC_INSERT_POLICY_PATH: ${AIC_INSERT_POLICY_PATH:-}
      AIC_INSERT_POLICY_START_S: ${AIC_INSERT_POLICY_START_S:-8.0}
      AIC_INSERT_POLICY_MAX_LIN_SPEED_MPS: ${AIC_INSERT_POLICY_MAX_LIN_SPEED_MPS:-0.020}
      AIC_INSERT_POLICY_MODE: ${AIC_INSERT_POLICY_MODE:-full}
      AIC_INSERT_POLICY_XY_GAIN: ${AIC_INSERT_POLICY_XY_GAIN:-1.0}
      AIC_INSERT_POLICY_MAX_XY_SPEED_MPS: ${AIC_INSERT_POLICY_MAX_XY_SPEED_MPS:-0.020}
      AIC_INSERT_POLICY_DOWN_VZ_MPS: ${AIC_INSERT_POLICY_DOWN_VZ_MPS:--0.006}
      AIC_MAX_TRIAL_S: ${AIC_MAX_TRIAL_S:-30.0}
      # Optional learned final visual servo. Empty keeps Plan D behavior unchanged.
      AIC_VISUAL_SERVO_MODEL_PATH: ${AIC_VISUAL_SERVO_MODEL_PATH:-}
      AIC_VISUAL_SERVO_START_S: ${AIC_VISUAL_SERVO_START_S:-8.0}
      AIC_VISUAL_SERVO_GAIN: ${AIC_VISUAL_SERVO_GAIN:-0.75}
      AIC_VISUAL_SERVO_MAX_XY_SPEED_MPS: ${AIC_VISUAL_SERVO_MAX_XY_SPEED_MPS:-0.010}
      AIC_VISUAL_SERVO_MAX_Z_SPEED_MPS: ${AIC_VISUAL_SERVO_MAX_Z_SPEED_MPS:-0.020}
      AIC_VISUAL_SERVO_DOWN_VZ_MPS: ${AIC_VISUAL_SERVO_DOWN_VZ_MPS:--0.006}
      AIC_VISUAL_SERVO_Z_MODE: ${AIC_VISUAL_SERVO_Z_MODE:-act}
      AIC_VISUAL_SERVO_DESCEND_XY_GATE_M: ${AIC_VISUAL_SERVO_DESCEND_XY_GATE_M:-0.010}
      AIC_VISUAL_SERVO_MAX_ABS_ERR_M: ${AIC_VISUAL_SERVO_MAX_ABS_ERR_M:-0.050}
      AIC_VISUAL_SERVO_X_SIGN: ${AIC_VISUAL_SERVO_X_SIGN:-1.0}
      AIC_VISUAL_SERVO_Y_SIGN: ${AIC_VISUAL_SERVO_Y_SIGN:-1.0}
      AIC_VISUAL_SERVO_DIRECTION_SPEED_MPS: ${AIC_VISUAL_SERVO_DIRECTION_SPEED_MPS:-0.006}
      AIC_VISUAL_SERVO_Z_STIFFNESS: ${AIC_VISUAL_SERVO_Z_STIFFNESS:-0.0}
      AIC_VISUAL_SERVO_Z_DAMPING: ${AIC_VISUAL_SERVO_Z_DAMPING:-100.0}
      # T1.1 — confidence-gated assist mode (defaults preserve legacy replace).
      AIC_VISUAL_SERVO_ASSIST_MODE: ${AIC_VISUAL_SERVO_ASSIST_MODE:-0}
      AIC_VISUAL_SERVO_CONFIDENCE_MIN: ${AIC_VISUAL_SERVO_CONFIDENCE_MIN:-0.0}
      # T1.2 — force-feedback final-descent state machine (off by default).
      AIC_FORCE_DESCENT_ENABLED: ${AIC_FORCE_DESCENT_ENABLED:-}
      AIC_FORCE_DESCENT_START_S: ${AIC_FORCE_DESCENT_START_S:-12.0}
      AIC_FORCE_DESCENT_BUDGET_S: ${AIC_FORCE_DESCENT_BUDGET_S:-10.0}
      AIC_FORCE_DESCENT_CONTACT_FZ_DELTA_N: ${AIC_FORCE_DESCENT_CONTACT_FZ_DELTA_N:-3.0}
      AIC_FORCE_DESCENT_MAX_FZ_N: ${AIC_FORCE_DESCENT_MAX_FZ_N:-16.0}
      AIC_FORCE_DESCENT_SEARCH_VZ_MPS: ${AIC_FORCE_DESCENT_SEARCH_VZ_MPS:--0.003}
      AIC_FORCE_DESCENT_INSERT_VZ_MPS: ${AIC_FORCE_DESCENT_INSERT_VZ_MPS:--0.004}
      AIC_FORCE_DESCENT_PERTURB_RADIUS_M: ${AIC_FORCE_DESCENT_PERTURB_RADIUS_M:-0.002}
      AIC_FORCE_DESCENT_PERTURB_PERIOD_S: ${AIC_FORCE_DESCENT_PERTURB_PERIOD_S:-1.5}
      AIC_FORCE_DESCENT_COMPLETE_DEPTH_M: ${AIC_FORCE_DESCENT_COMPLETE_DEPTH_M:-0.008}
      AIC_FORCE_DESCENT_REQUIRE_VS_CONF: ${AIC_FORCE_DESCENT_REQUIRE_VS_CONF:-1}
      AIC_FORCE_DESCENT_VS_CONF_MIN: ${AIC_FORCE_DESCENT_VS_CONF_MIN:-0.70}
      AIC_FORCE_DESCENT_VS_CONF_TICKS: ${AIC_FORCE_DESCENT_VS_CONF_TICKS:-10}
      AIC_FORCE_DESCENT_MAX_XY_SPEED_MPS: ${AIC_FORCE_DESCENT_MAX_XY_SPEED_MPS:-0.008}
      AIC_FORCE_DESCENT_LIFT_VZ_MPS: ${AIC_FORCE_DESCENT_LIFT_VZ_MPS:-0.010}
      AIC_FORCE_DESCENT_LIFT_DURATION_S: ${AIC_FORCE_DESCENT_LIFT_DURATION_S:-0.5}
      AIC_FORCE_DESCENT_NAVIGATE_SPEED_MPS: ${AIC_FORCE_DESCENT_NAVIGATE_SPEED_MPS:-0.008}
      AIC_FORCE_DESCENT_NAVIGATE_MAX_S: ${AIC_FORCE_DESCENT_NAVIGATE_MAX_S:-5.0}
      AIC_FORCE_DESCENT_NAVIGATE_HOLD_TICKS: ${AIC_FORCE_DESCENT_NAVIGATE_HOLD_TICKS:-4}
      AIC_FORCE_DESCENT_DESCEND_MAX_S: ${AIC_FORCE_DESCENT_DESCEND_MAX_S:-4.0}
      AIC_FORCE_DESCENT_Z_STIFFNESS: ${AIC_FORCE_DESCENT_Z_STIFFNESS:-1000.0}
      AIC_FORCE_DESCENT_Z_DAMPING: ${AIC_FORCE_DESCENT_Z_DAMPING:-120.0}
      # AIC_ENABLE_ACL: true
networks:
  default:
    internal: true
