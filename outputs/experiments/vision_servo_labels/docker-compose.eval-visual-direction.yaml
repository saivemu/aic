services:
  model:
    environment:
      AIC_VISUAL_SERVO_MODEL_PATH: /opt/visual_servo/best_visual_servo.pt
      AIC_MAX_TRIAL_S: ${AIC_MAX_TRIAL_S:-30.0}
      AIC_VISUAL_SERVO_START_S: ${AIC_VISUAL_SERVO_START_S:-9.0}
      AIC_VISUAL_SERVO_GAIN: ${AIC_VISUAL_SERVO_GAIN:-1.0}
      AIC_VISUAL_SERVO_MAX_XY_SPEED_MPS: ${AIC_VISUAL_SERVO_MAX_XY_SPEED_MPS:-0.006}
      AIC_VISUAL_SERVO_DIRECTION_SPEED_MPS: ${AIC_VISUAL_SERVO_DIRECTION_SPEED_MPS:-0.003}
      AIC_VISUAL_SERVO_MAX_Z_SPEED_MPS: ${AIC_VISUAL_SERVO_MAX_Z_SPEED_MPS:-0.020}
      AIC_VISUAL_SERVO_DOWN_VZ_MPS: ${AIC_VISUAL_SERVO_DOWN_VZ_MPS:--0.006}
      AIC_VISUAL_SERVO_Z_MODE: ${AIC_VISUAL_SERVO_Z_MODE:-act}
      AIC_VISUAL_SERVO_DESCEND_XY_GATE_M: ${AIC_VISUAL_SERVO_DESCEND_XY_GATE_M:-0.010}
      AIC_VISUAL_SERVO_MAX_ABS_ERR_M: ${AIC_VISUAL_SERVO_MAX_ABS_ERR_M:-0.050}
      AIC_VISUAL_SERVO_X_SIGN: ${AIC_VISUAL_SERVO_X_SIGN:-1.0}
      AIC_VISUAL_SERVO_Y_SIGN: ${AIC_VISUAL_SERVO_Y_SIGN:-1.0}
      AIC_ENABLE_FINAL_SEARCH: ""
      AIC_INSERT_POLICY_PATH: ""
    volumes:
      - ${PWD}/outputs/experiments/vision_servo_labels/models/visual_direction_balanced20_o25_s2:/opt/visual_servo:ro
